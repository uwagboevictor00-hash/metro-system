<!DOCTYPE html>
<html>
<head>
  <title>METRO CORE</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background: black;
      color: gold;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .box {
      border: 2px solid gold;
      padding: 20px;
      margin: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    button {
      background: gold;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>👑 METRO CORE SYSTEM</h1>

  <div class="box">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email"><br>
    <input id="loginPass" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>

  <div class="box">
    <h2>Sign Up</h2>
    <input id="regEmail" placeholder="Email"><br>
    <input id="regPass" type="password" placeholder="Password"><br>
    <button onclick="register()">Create Account</button>
  </div>

  <p id="msg"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAbydM0YVxCmZvH4JHmhDm653RXk_VdeZs",
      authDomain: "metro-system-d8b99.firebaseapp.com",
      projectId: "metro-system-d8b99",
      storageBucket: "metro-system-d8b99.firebasestorage.app",
      messagingSenderId: "822253846997",
      appId: "1:822253846997:web:b460524ba1581507637d5c",
      measurementId: "G-N5NZHTSGQW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = function () {
      let email = loginEmail.value;
      let pass = loginPass.value;

      signInWithEmailAndPassword(auth, email, pass)
        .then(() => {
          window.location.href = "metro.html";
        })
        .catch(err => msg.innerText = err.message);
    }

    window.register = function () {
      let email = regEmail.value;
      let pass = regPass.value;

      createUserWithEmailAndPassword(auth, email, pass)
        .then(() => {
          msg.innerText = "Account created ✔️";
        })
        .catch(err => msg.innerText = err.message);
    }

    // PWA SERVICE WORKER
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
