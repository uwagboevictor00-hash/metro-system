<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Metro Core System</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:white;
}

.header{
  background:black;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#00ffcc;
  box-shadow:0 0 10px #00ffcc;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:30px;
}

.card{
  background:#111;
  margin:15px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px #00ffcc;
  width:85%;
  text-align:center;
}

.profile{
  font-size:24px;
  font-weight:bold;
  color:#00ffcc;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  background:#00ffcc;
  color:black;
  font-weight:bold;
  border-radius:10px;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="header">
👑 METRO CORE SYSTEM
</div>

<div class="container">

  <div class="card">
    <div class="profile">Welcome Boss 😎</div>
    <p>Your Metro System is now ACTIVE</p>
  </div>

  <div class="card">
    <h3>Dashboard</h3>
    <p>Status: ONLINE 🌍</p>
    <a class="btn" href="#">Enter Core</a>
  </div>

  <div class="card">
    <h3>Level</h3>
    <p>MAX LEVEL 1 UNLOCKED 🔓</p>
  </div>

</div>

</body>
</html>
