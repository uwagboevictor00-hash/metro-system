<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Metro Core System</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:white;
}

.header{
  background:black;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#00ffcc;
  box-shadow:0 0 10px #00ffcc;
}

.card{
  background:#111;
  margin:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px #00ffcc;
  text-align:center;
}

.button{
  display:inline-block;
  padding:10px 20px;
  margin-top:10px;
  background:#00ffcc;
  color:black;
  font-weight:bold;
  border-radius:10px;
  text-decoration:none;
}

.profile{
  font-size:20px;
  font-weight:bold;
  color:#00ffcc;
}

</style>
</head>

<body>

<div class="header">
👑 METRO CORE SYSTEM
</div>

<div class="card">
  <div class="profile">
    Welcome Boss 😎
  </div>
  <p>Your Metro system don activate successfully</p>
</div>

<div class="card">
  <h3>Dashboard</h3>
  <p>Status: ONLINE 🌍</p>
  <a class="button" href="#">Enter Core</a>
</div>

<div class="card">
  <h3>Level</h3>
  <p>MAX LEVEL 1 ACTIVE</p>
</div>

</body>
</html>
