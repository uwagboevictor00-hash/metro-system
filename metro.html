<!DOCTYPE html>
<html>
<head>
  <title>METRO CORE ADMIN SYSTEM</title>

  <style>
    body {
      background: black;
      color: gold;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .box {
      border: 2px solid gold;
      padding: 20px;
      margin: 15px;
      border-radius: 10px;
    }

    button {
      background: gold;
      border: none;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      margin: 8px;
    }

    .admin {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>👑 METRO CORE SYSTEM</h1>

  <div class="box">
    <p id="email">Loading...</p>
    <p id="role">Role: USER</p>
    <p id="points">METRO POINTS: 0</p>
  </div>

  <button onclick="addPoints()">EARN POINTS 🔥</button>
  <button onclick="goLeaderboard()">🏆 LEADERBOARD</button>
  <button onclick="goChat()">💬 CHAT</button>
  <button onclick="goAdmin()">👮 ADMIN PANEL</button>
  <button onclick="logout()">LOGOUT</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAbydM0YVxCmZvH4JHmhDm653RXk_VdeZs",
      authDomain: "metro-system-d8b99.firebaseapp.com",
      projectId: "metro-system-d8b99",
      storageBucket: "metro-system-d8b99.firebasestorage.app",
      messagingSenderId: "822253846997",
      appId: "1:822253846997:web:b460524ba1581507637d5c",
      measurementId: "G-N5NZHTSGQW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userRef;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      document.getElementById("email").innerText = user.email;

      userRef = doc(db, "users", user.uid);

      const snap = await getDoc(userRef);

      if (!snap.exists()) {
        await setDoc(userRef, {
          email: user.email,
          points: 0,
          role: "user"
        });
      }

      loadData();
    });

    async function loadData() {
      const snap = await getDoc(userRef);
      const data = snap.data();

      document.getElementById("points").innerText =
        "METRO POINTS: " + data.points;

      document.getElementById("role").innerText =
        "Role: " + data.role.toUpperCase();

      if (data.role === "admin") {
        document.getElementById("role").classList.add("admin");
      }
    }

    window.addPoints = async function () {
      const snap = await getDoc(userRef);

      await updateDoc(userRef, {
        points: snap.data().points + 10
      });

      loadData();
    }

    window.goLeaderboard = function () {
      window.location.href = "leaderboard.html";
    }

    window.goChat = function () {
      window.location.href = "chat.html";
    }

    window.goAdmin = function () {
      window.location.href = "admin.html";
    }

    window.logout = function () {
      signOut(auth).then(() => {
        window.location.href = "index.html";
      });
    }
  </script>

</body>
</html>
