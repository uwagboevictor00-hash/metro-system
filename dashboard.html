<!DOCTYPE html>
<html>
<head>
  <title>METRO DASHBOARD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>👑 METRO SYSTEM</h1>
    <h2 id="welcome"></h2>

    <div class="grid">

      <div class="card" onclick="clickSound(); alert('Opening Files...')">
        📁 Active Files
      </div>

      <div class="card" onclick="clickSound(); alert('System Stable ⚙️')">
        ⚙️ System Status
      </div>

      <div class="card" onclick="clickSound(); alert('No New Messages 💬')">
        💬 Messages
      </div>

      <div class="card neon" onclick="logout()">
        🚪 Logout
      </div>

    </div>
  </div>

<script>
let user = sessionStorage.getItem("user");
document.getElementById("welcome").innerText = "Welcome, " + user + " 👑";

function logout() {
  window.location.href = "index.html";
}

function clickSound() {
  let audio = new AudioContext();
  let osc = audio.createOscillator();
  osc.connect(audio.destination);
  osc.start();
  osc.stop(audio.currentTime + 0.1);
}
</script>
