<!DOCTYPE html>
<html>
<head>
  <title>Metro Culture Login</title>
</head>

<body>

  <h2>Login to Edo Culture System</h2>

  <input type="email" id="email" placeholder="Email" />
  <br><br>

  <input type="password" id="password" placeholder="Password" />
  <br><br>

  <button onclick="login()">Login</button>

  <p id="msg"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDqAPK98kyrryi_dudqkWX0aMKwUe7M1kk",
      authDomain: "edo-culture-system.firebaseapp.com",
      projectId: "edo-culture-system",
      storageBucket: "edo-culture-system.firebasestorage.app",
      messagingSenderId: "825410277594",
      appId: "1:825410277594:web:78256b6a9f371b957515e3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = function () {

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          document.getElementById("msg").innerText = "Login successful 🚀";

          // go dashboard
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1000);

        })
        .catch((error) => {
          document.getElementById("msg").innerText = error.message;
        });

    };
  </script>

</body>
</html>
